# .golangci.yml — deterministic lint config consumed by ci.yml's `lint` job.
# Conservative: disable-all + a short, well-understood enable list so CI lint is stable and the
# codebase is very likely already green. Add linters deliberately; never enable-all.
#
# SCHEMA NOTE: this file is the golangci-lint v1 schema (no top-level `version:` key). CI pins
# golangci-lint v1.61 (ci.yml), where it passes. golangci-lint v2.x REJECTS the v1 schema
# (`can't load config: unsupported version of the configuration: ""`); local developers with v2
# installed should either install v1.61 (`go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.61.0`)
# or migrate this file to the v2 schema when bumping the CI pin.
run:
  timeout: 5m
  go: '1.22'

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  errcheck:
    # Don't flag unchecked Close() on io.Closer (common, noisy, low-value).
    exclude-functions:
      - (io.Closer).Close

issues:
  # Don't auto-disable; surface real findings. Show up to 50 per file.
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Pre-existing errcheck findings in non-config packages (out of S1 scope).
    - path: cmd/stubagent/
      linters: [errcheck]
    - path: internal/git/stagediff_test.go
      linters: [errcheck]
    - path: pkg/stagehand/stagehand_test.go
      linters: [errcheck, unused]
    - path: internal/cmd/root_test.go
      linters: [errcheck]
