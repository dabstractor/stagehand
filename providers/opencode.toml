# ============================================================================
# opencode — reference manifest for the `opencode` built-in provider (PRD §12.6)
# ============================================================================
#
# WHAT THIS FILE IS
#   Human-readable REFERENCE DOCUMENTATION for the `opencode` provider. It mirrors the
#   compiled-in manifest `builtinOpenCode()` in internal/provider/builtin.go BYTE-FOR-BYTE
#   (modulo comments). It is NOT loaded at runtime — built-ins are compiled into
#   the Go binary. (The config loader reads .stagecoach.toml, not this directory.)
#
# HOW TO USE IT AS A CONFIG OVERRIDE (PRD §12.8)
#   To override the built-in opencode (or define a variant), copy the FIELD lines below
#   (NOT this header) into your config file and wrap them in a `[provider.opencode]`
#   table, then DELETE the `name = "opencode"` line — the table key supplies the name.
#   Change only the fields you want; fields you omit inherit the built-in's value.
#       # ~/.config/stagecoach/config.toml  (or a repo-local .stagecoach.toml)
#       [provider.opencode]
#       default_model = "anthropic/claude-sonnet-4"  # e.g. override only the model
#
# RENDERED COMMAND (external_deps.md §opencode)
#   opencode run -m anthropic/claude-sonnet-4 "<sys>\n\n<user payload>"
#   (positional delivery; payload is the trailing arg)
#
# TOOLS-DISABLE CATEGORY (§12.7.1): READ-ONLY CONSTRAINT — `opencode run` is already
#   a non-interactive, read-only one-shot; no extra bare flags needed.
# ============================================================================

# --- identity / discovery ---
name = "opencode"                   # identity; the value you pass to --provider.
detect = "opencode"                 # command looked up on $PATH to decide "installed".
command = "opencode"                # the executable to run (exec.LookPath; may be absolute).
list_models_command = ["opencode", "models"]  # VERIFIED 2026-07-03 via `opencode models` (exit 0); FR-L2/FR-D5. Never an HTTP call (§6.2 N2).

# --- subcommand ---
subcommand = ["run"]                # `opencode run` is non-interactive and prints the final message to stdout.

# --- prompt delivery ---
prompt_delivery = "positional"     # the user payload (system prompt + diff) is appended as a positional arg.

# --- non-interactive mode ---
print_flag = ""                     # NON-NIL empty: `run` is already non-interactive (no separate print flag).

# --- model ---
model_flag = "-m"                   # the model-selection flag.
default_model = ""                  # NON-NIL empty: opencode's model space is huge and user-specific
                                    # (format: provider/model, e.g. anthropic/claude-sonnet-4) — the user
                                    # MUST set a model (Appendix E #3).

# --- system prompt ---
system_prompt_flag = ""             # NON-NIL empty: no system-prompt flag on `run` — the system prompt
                                    # is PREPENDED to the payload (§12.2 fallback).

# --- sub-provider ---
provider_flag = ""                  # NON-NIL empty: provider is part of the model string (e.g. anthropic/...).
# default_provider is ABSENT (nil) — opencode has no sub-provider concept.

# --- bare mode (§12.7.1: read-only constraint) ---
bare_flags = []                     # NON-NIL empty array: `run` is already a read-only, non-interactive
                                    # one-shot — no extra bare flags needed. (Present-but-empty, NOT absent.)

# --- output ---
output = "raw"                      # cleaned stdout IS the commit message (DEFAULT).
strip_code_fence = true             # strip one layer of ``` / ~~~ if the agent wraps the output.

# --- absent fields (PRD §12.1) ---
# list_models_command, prompt_flag, json_field, retry_instruction, and [env] are NOT set for opencode and therefore
# omitted above. At resolve time they take their §12.1 defaults: prompt_delivery -> "stdin",
# output -> "raw", strip_code_fence -> true, retry_instruction ->
# "Output ONLY the commit message. No preamble, no markdown, no quotes.",
# and print_flag/model_flag/etc -> "" (no flag emitted).
