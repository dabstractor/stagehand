# ============================================================================
# claude — reference manifest for the `claude` built-in provider (PRD §12.4)
# ============================================================================
#
# WHAT THIS FILE IS
#   Human-readable REFERENCE DOCUMENTATION for the `claude` provider. It mirrors the
#   compiled-in manifest `builtinClaude()` in internal/provider/builtin.go BYTE-FOR-BYTE
#   (modulo comments). It is NOT loaded at runtime — built-ins are compiled into
#   the Go binary. (The config loader reads .stagecoach.toml, not this directory.)
#
# HOW TO USE IT AS A CONFIG OVERRIDE (PRD §12.8)
#   To override the built-in claude (or define a variant), copy the FIELD lines below
#   (NOT this header) into your config file and wrap them in a `[provider.claude]`
#   table, then DELETE the `name = "claude"` line — the table key supplies the name.
#   Change only the fields you want; fields you omit inherit the built-in's value.
#       # ~/.config/stagecoach/config.toml  (or a repo-local .stagecoach.toml)
#       [provider.claude]
#       default_model = "opus-4"       # e.g. override only the model
#
# RENDERED COMMAND (external_deps.md §claude)
#   claude -p --model sonnet --system-prompt "<sys>" \
#      --tools "" --setting-sources "" --no-session-persistence < <user payload via stdin>
#
# TOOLS-DISABLE CATEGORY (§12.7.1): EXPLICIT switch — claude uses `--tools ""` to
#   disable ALL built-in tools (documented: 'Use "" to disable all tools'), making
#   the call a pure text-in/text-out.
# ============================================================================

# --- identity / discovery ---
name = "claude"                     # identity; the value you pass to --provider.
detect = "claude"                   # command looked up on $PATH to decide "installed".
command = "claude"                  # the executable to run (exec.LookPath; may be absolute).

# --- prompt delivery ---
prompt_delivery = "stdin"           # pipe the user payload (system prompt + diff) to stdin (DEFAULT;
                                    # avoids arg-length limits vs positional).

# --- non-interactive mode ---
print_flag = "-p"                   # -p / --print: process the prompt and exit (one-shot).

# --- model ---
model_flag = "--model"              # the model-selection flag.
default_model = "sonnet"            # model used if the user specifies none.

# --- system prompt ---
system_prompt_flag = "--system-prompt"  # claude supports a first-class system prompt (delivered via flag).
#   NOTE: --system-prompt REPLACES the default; --append-system-prompt is the additive
#   alternative (a user who wants CC's default persona retained can switch the flag).

# --- sub-provider ---
provider_flag = ""                  # NON-NIL empty: claude has no sub-provider concept (§12.4 "n/a").
# default_provider is ABSENT (nil) — claude has no sub-provider, so the key is omitted.

# --- bare mode (§12.7.1: explicit tool-disable switch) ---
bare_flags = [                      # appended VERBATIM to make the call bare + ephemeral.
  "--tools", "",                    # disable ALL built-in tools (claude --help: 'Use "" to disable all tools').
  "--setting-sources", "",          # load no settings sources (clean slate).
  "--no-session-persistence",       # ephemeral (only valid with -p).
]

# --- tooled mode (v2; §11.5: the stager role) ---
# INVERTS claude's bare mode: instead of --tools "" (disable ALL tools), ENABLE tools
# RESTRICTED via an allowlist to Bash(git add:*,git apply:*,git status:*,git diff:*)
# + Read + Edit — the staging-relevant toolset ONLY. This makes ref-mutating git subcommands
# (commit/push/update-ref/reset/rebase/amend) STRUCTURALLY UNREACHABLE for the stager, delivering
# the §19 "cannot commit/amend/push" guarantee for claude.
# --setting-sources "" (clean slate) + --no-session-persistence (ephemeral) carry over.
# # TO CONFIRM (P3.M2.T3): the item contract uses --allowed-tools; external_deps.md records --tools.
# Verify against a real claude --help at the first stager run; if wrong, swap the flag token.
tooled_flags = [
  "--allowed-tools", "Bash(git add:*,git apply:*,git status:*,git diff:*),Read,Edit",  # staging-only allowlist (excludes commit/amend/push/etc.)
  "--setting-sources", "",                      # clean slate
  "--no-session-persistence",                  # ephemeral (only valid with -p)
]
# RENDERED TOOLED COMMAND
#   claude -p --model sonnet --system-prompt "<sys>" \
#      --allowed-tools "Bash(git add:*,git apply:*,git status:*,git diff:*),Read,Edit" --setting-sources "" \
#      --no-session-persistence < <user payload via stdin>

# --- output ---
output = "raw"                      # cleaned stdout IS the commit message (DEFAULT).
strip_code_fence = true             # strip one layer of ``` / ~~~ if the agent wraps the output.

# --- reasoning levels (v3; §12.1, FR-R6) ---
# claude exposes `--effort low|medium|high` (verified vs `claude --help`, external_deps.md §claude).
# off has no entry ⇒ graceful no-op (FR-R6). Tokens append after the model flag at render.
[reasoning_levels]
high = ["--effort", "high"]
medium = ["--effort", "medium"]
low = ["--effort", "low"]

# --- absent fields (PRD §12.1) ---
# list_models_command, subcommand, prompt_flag, json_field, retry_instruction, default_provider,
# and [env] are NOT set for claude and therefore omitted above.
