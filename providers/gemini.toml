# ============================================================================
# gemini — reference manifest for the `gemini` built-in provider (PRD §12.5)
# ============================================================================
#
# WHAT THIS FILE IS
#   Human-readable REFERENCE DOCUMENTATION for the `gemini` provider. It mirrors the
#   compiled-in manifest `builtinGemini()` in internal/provider/builtin.go BYTE-FOR-BYTE
#   (modulo comments). It is NOT loaded at runtime — built-ins are compiled into
#   the Go binary. (The config loader reads .stagecoach.toml, not this directory.)
#
# HOW TO USE IT AS A CONFIG OVERRIDE (PRD §12.8)
#   To override the built-in gemini (or define a variant), copy the FIELD lines below
#   (NOT this header) into your config file and wrap them in a `[provider.gemini]`
#   table, then DELETE the `name = "gemini"` line — the table key supplies the name.
#   Change only the fields you want; fields you omit inherit the built-in's value.
#       # ~/.config/stagecoach/config.toml  (or a repo-local .stagecoach.toml)
#       [provider.gemini]
#       default_model = "gemini-2.5-flash"  # e.g. override only the model
#
# RENDERED COMMAND (external_deps.md §gemini)
#   gemini -m gemini-3.1-pro --approval-mode default < "<sys>\n\n<user payload>"
#   (stdin delivery; gemini appends stdin to the prompt)
#
# TOOLS-DISABLE CATEGORY (§12.7.1): READ-ONLY CONSTRAINT — gemini has NO global
#   tool-disable switch; `--approval-mode default` constrains it to a read-only,
#   never-ask profile (don't auto-run tools, never prompt).
# ============================================================================

# --- identity / discovery ---
name = "gemini"                     # identity; the value you pass to --provider.
detect = "gemini"                   # command looked up on $PATH to decide "installed".
command = "gemini"                  # the executable to run (exec.LookPath; may be absolute).

# --- prompt delivery ---
prompt_delivery = "stdin"           # REVISED from §12.5 "positional" (work-item + external_deps.md §gemini
                                    # + Appendix E #1): gemini appends stdin to the prompt, and stdin avoids
                                    # arg-length limits on ~300 KB diffs. `-p/--prompt` is DEPRECATED.

# --- non-interactive mode ---
print_flag = ""                     # NON-NIL empty: positional/stdin implies one-shot (no separate print flag).

# --- model ---
model_flag = "-m"                   # the model-selection flag.
default_model = "gemini-3.1-pro"    # model used if the user specifies none.

# --- system prompt ---
system_prompt_flag = ""             # NON-NIL empty: gemini-cli has NO system-prompt flag — the system prompt
                                    # is PREPENDED to the payload (§12.2 fallback).

# --- sub-provider ---
provider_flag = ""                  # NON-NIL empty: gemini has no sub-provider concept.
# default_provider is ABSENT (nil) — gemini has no sub-provider, so the key is omitted.

# --- bare mode (§12.7.1: read-only constraint) ---
bare_flags = [                      # appended VERBATIM to enforce a read-only, never-ask profile.
  "--approval-mode", "default",    # don't auto-run tools, never ask (choices: default|auto_edit|yolo).
]

# --- output ---
output = "raw"                      # cleaned stdout IS the commit message (DEFAULT).
strip_code_fence = true             # strip one layer of ``` / ~~~ if the agent wraps the output.

# --- absent fields (PRD §12.1) ---
# list_models_command, subcommand, prompt_flag, json_field, retry_instruction, and [env] are NOT set for gemini and therefore
# omitted above. At resolve time they take their §12.1 defaults: prompt_delivery -> "stdin",
# output -> "raw", strip_code_fence -> true, retry_instruction ->
# "Output ONLY the commit message. No preamble, no markdown, no quotes.",
# and print_flag/model_flag/etc -> "" (no flag emitted).
