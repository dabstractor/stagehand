# ============================================================================
# cursor — reference manifest for the `cursor` built-in provider (PRD §12.7)
# ============================================================================
#
# WHAT THIS FILE IS
#   Human-readable REFERENCE DOCUMENTATION for the `cursor` provider. It mirrors the
#   compiled-in manifest `builtinCursor()` in internal/provider/builtin.go BYTE-FOR-BYTE
#   (modulo comments). It is NOT loaded at runtime — built-ins are compiled into
#   the Go binary. (The config loader reads .stagehand.toml, not this directory.)
#
# HOW TO USE IT AS A CONFIG OVERRIDE (PRD §12.8)
#   To override the built-in cursor (or define a variant), copy the FIELD lines below
#   (NOT this header) into your config file and wrap them in a `[provider.cursor]`
#   table, then DELETE the `name = "cursor"` line — the table key supplies the name.
#   Change only the fields you want; fields you omit inherit the built-in's value.
#       # ~/.config/stagehand/config.toml  (or a repo-local .stagehand.toml)
#       [provider.cursor]
#       default_model = "gpt-5"          # e.g. override only the model
#
# RENDERED COMMAND (external_deps.md §cursor)
#   agent -p --mode ask --trust --model <model> "<sys>\n\n<user payload>"
#   (positional delivery; payload is the trailing arg)
#
# TOOLS-DISABLE CATEGORY (§12.7.1): READ-ONLY CONSTRAINT — cursor's -p defaults to FULL
#   tool access; --mode ask overrides this to Q&A-style, read-only (no edits). --trust
#   skips the workspace-trust prompt that would otherwise block -p.
#
# DETECT/COMMAND NOTE: the standalone Cursor Agent binary is `agent` (NOT `cursor`).
#   cursor is the ONLY provider where detect != name. If `agent` is not on $PATH, override
#   with command="cursor" subcommand=["agent"] in your config.
# ============================================================================

# --- identity / discovery ---
name = "cursor"                     # identity; the value you pass to --provider.
detect = "agent"                    # the binary is `agent` (NOT `cursor`) — the ONLY provider where
                                    # detect != name. If `agent` is not on $PATH, override with
                                    # command="cursor" subcommand=["agent"] in your config.
command = "agent"                   # the executable to run (exec.LookPath; may be absolute).
list_models_command = ["agent", "models"]      # VERIFIED 2026-07-03: `agent --help` lists `models`; live run exits 1 (auth required). Binary is `agent` (≠ name). FR-L2/FR-D5. Never an HTTP call (§6.2 N2).

# --- subcommand ---
subcommand = []                     # NON-NIL empty array: no subcommand tokens (present-but-empty, NOT absent).

# --- prompt delivery ---
prompt_delivery = "positional"     # the user payload (system prompt + diff) is appended as a positional arg.

# --- non-interactive mode ---
print_flag = "-p"                   # -p: non-interactive print mode (writes answer to stdout).

# --- model ---
model_flag = "--model"              # the model-selection flag.
default_model = ""                  # NON-NIL empty: cursor has per-account model availability —
                                    # the user MUST set a model.

# --- system prompt ---
system_prompt_flag = ""             # NON-NIL empty: no system-prompt flag on `agent` — the system prompt
                                    # is PREPENDED to the payload (§12.2 fallback).

# --- sub-provider ---
provider_flag = ""                  # NON-NIL empty: cursor has no sub-provider concept.
# default_provider is ABSENT (nil) — cursor has no sub-provider, so the key is omitted.

# --- bare mode (§12.7.1: read-only constraint) ---
bare_flags = [                      # appended VERBATIM to enforce a read-only, non-mutating profile.
  "--mode", "ask",                  # Q&A style, READ-ONLY (no edits) — overrides -p's default
                                    # full-tools profile. §12.7.1 read-only constraint.
  "--trust",                        # skip the workspace-trust prompt that would otherwise block -p.
]
# Deliberately does NOT set --force / --yolo (those force-allow commands).

# --- output ---
output = "raw"                      # cleaned stdout IS the commit message (DEFAULT).
strip_code_fence = true             # strip one layer of ``` / ~~~ if the agent wraps the output.

# TO CONFIRM (integration): that `--mode ask` wins over -p's default full-tools profile
# — i.e. the combo (-p --mode ask --trust) is genuinely read-only. Expected ('ask'
# is defined as read-only Q&A); verify against a real run. Resolved by P1.M5.T1.S2.

# --- absent fields (PRD §12.1) ---
# list_models_command, prompt_flag, json_field, retry_instruction, and [env] are NOT set for cursor and therefore
# omitted above. At resolve time they take their §12.1 defaults: prompt_delivery -> "stdin",
# output -> "raw", strip_code_fence -> true, retry_instruction ->
# "Output ONLY the commit message. No preamble, no markdown, no quotes.",
# and print_flag/model_flag/etc -> "" (no flag emitted).
