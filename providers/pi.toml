# ============================================================================
# pi — reference manifest for the `pi` built-in provider (PRD §12.3)
# ============================================================================
#
# WHAT THIS FILE IS
#   Human-readable REFERENCE DOCUMENTATION for the `pi` provider. It mirrors the
#   compiled-in manifest `builtinPi()` in internal/provider/builtin.go BYTE-FOR-BYTE
#   (modulo comments). It is NOT loaded at runtime — built-ins are compiled into
#   the Go binary. (The config loader reads .stagehand.toml, not this directory.)
#
# HOW TO USE IT AS A CONFIG OVERRIDE (PRD §12.8)
#   To override the built-in pi (or define a variant), copy the FIELD lines below
#   (NOT this header) into your config file and wrap them in a `[provider.pi]`
#   table, then DELETE the `name = "pi"` line — the table key supplies the name.
#   Change only the fields you want; fields you omit inherit the built-in's value.
#       # ~/.config/stagehand/config.toml  (or a repo-local .stagehand.toml)
#       [provider.pi]
#       default_model = "glm-5.2"          # e.g. override only the model
#
# RENDERED COMMAND (external_deps.md §pi; byte-for-byte with explicit overrides)
#   pi --provider <backend> --model <m> --system-prompt "<sys>" \
#      --no-tools --no-extensions --no-skills --no-prompt-templates \
#      --no-context-files --no-session -p   < <user payload via stdin>
#   (Personal-override example, NOT the shipped default: <backend>=zai, <m>=glm-5-turbo = commit-pi.)
#
# TOOLS-DISABLE CATEGORY (§12.7.1): EXPLICIT switch — pi offers literal --no-* flags,
#   so the call is a pure text-in/text-out with NO agent loop (the "bare" ideal).
# ============================================================================

# --- identity / discovery ---
name = "pi"                         # identity; the value you pass to --provider.
detect = "pi"                       # command looked up on $PATH to decide "installed". Absent -> command.
command = "pi"                      # the executable to run (exec.LookPath; may be absolute).
list_models_command = ["pi", "--list-models"]    # VERIFIED 2026-07-03 via `pi --list-models` (exit 0); FLAG form, not a subcommand. FR-L2/FR-D5. Never an HTTP call (§6.2 N2).

# --- prompt delivery ---
prompt_delivery = "stdin"           # pipe the user payload (system prompt + diff) to stdin (DEFAULT;
                                    # avoids arg-length limits vs positional).

# --- non-interactive mode ---
print_flag = "-p"                   # -p / --print: process the prompt and exit (one-shot).

# --- model ---
model_flag = "--model"              # the model-selection flag.
default_model = ""                     # FR-D2: empty in the shipped default; config init fills per-role (§9.16 FR-D4).
                                    # The zai/glm-5-turbo setup is a personal override (NOT the shipped default).

# --- system prompt ---
system_prompt_flag = "--system-prompt"  # pi supports a first-class system prompt (delivered via flag).

# --- sub-provider ---
provider_flag = "--provider"        # pi routes to backends: zai | anthropic | google | ...
# default_provider removed in v3: the inference backend is now the slash-prefix on the model
# (e.g. "zai/glm-5.2" → --provider zai --model glm-5.2). FR-R5b enforces this at Render.

# --- bare mode (§12.7.1: explicit tool-disable switch) ---
bare_flags = [                      # appended VERBATIM to make the call bare + ephemeral.
  "--no-tools",                     # disable ALL tools (pure text-in/text-out).
  "--no-extensions",                # disable extension discovery.
  "--no-skills",                    # disable skill discovery/loading.
  "--no-prompt-templates",          # disable prompt-template discovery.
  "--no-context-files",             # disable AGENTS.md / CLAUDE.md discovery.
  "--no-session",                   # don't save the session (ephemeral).
]

# --- tooled mode (v2; §11.5: the stager role) ---
# pi's tooled profile = bare MINUS --no-tools: pi's native tool system ON, everything else still off
# (chrome-less + ephemeral). pi has NO git-scoped allowlist flag (--help shows only all-or-nothing
# --no-tools), so its tools cannot be scoped to staging-only git subcommands without disabling tools
# entirely (which would bar the stager from running git at all).
#
# SAFETY MODEL — HONEST (contrast with claude): claude's stager IS structurally constrained by a
# staging-only git allowlist (Bash(git add:*,git apply:*,git status:*,git diff:*); see claude.toml).
# pi's stager is NOT structurally/flag-scoped — a misbehaving pi stager CAN run arbitrary Bash,
# including `git commit`, `git push`, `git update-ref`, `git reset`, and `rm -rf`. PRD §19's
# "structurally constrained … cannot commit/amend/push" claim therefore does NOT hold for pi. pi's
# stager is instead:
#   (1) INSTRUCTIONALLY constrained — by the §17.6 stager task prompt (it is told to stage only), and
#   (2) BEST-EFFORT guarded — by the HEAD-movement defense-in-depth check (P1.M2.T1.S3): HEAD is
#       snapshotted before each stager call and the run aborts (safety violation) if HEAD moved when the
#       stager returns. THE SAFETY NET IS THIS GUARD, NOT FLAG-SCOPING.
tooled_flags = [
  "--no-extensions",                # disable extension discovery.
  "--no-skills",                    # disable skill discovery/loading.
  "--no-prompt-templates",          # disable prompt-template discovery.
  "--no-context-files",             # disable AGENTS.md / CLAUDE.md discovery.
  "--no-session",                   # don't save the session (ephemeral).
]
# RENDERED TOOLED COMMAND
#   pi --provider <backend> --model <m> --system-prompt "<sys>" \
#      --no-extensions --no-skills --no-prompt-templates \
#      --no-context-files --no-session -p   < <user payload via stdin>

# --- output ---
output = "raw"                      # cleaned stdout IS the commit message (DEFAULT).
strip_code_fence = true             # strip one layer of ``` / ~~~ if the agent wraps the output.

# --- absent fields (PRD §12.1) ---
# subcommand, list_models_command, prompt_flag, json_field, retry_instruction, and [env] are NOT set for pi and therefore
# omitted above. At resolve time they take their §12.1 defaults: prompt_delivery -> "stdin",
# output -> "raw", strip_code_fence -> true, retry_instruction ->
# "Output ONLY the commit message. No preamble, no markdown, no quotes.",
# and print_flag/model_flag/etc -> "" (no flag emitted).

# --- reasoning levels (v3; §12.1, FR-R6) ---
# pi exposes `--thinking off|minimal|low|medium|high|xhigh` (verified `pi --help`, external_deps.md §pi).
# off has no entry ⇒ graceful no-op (FR-R6); minimal/xhigh have no stagehand level. Tokens append
# after the model flag at render.
[reasoning_levels]
high = ["--thinking", "high"]
medium = ["--thinking", "medium"]
low = ["--thinking", "low"]
